services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
