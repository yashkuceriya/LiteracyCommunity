services:
  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ORIGINS=http://localhost
      - CSRF_TRUSTED_ORIGINS=http://localhost
      - SECURE_SSL_REDIRECT=False

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
